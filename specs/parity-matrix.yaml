version: "0.1"
source_snapshot: "AMFlow 1.2"
production_runtime:
  language: "C++17"
  reducer_boundary: "external Kira + Fermat"
  mathematica_runtime_allowed: false
phases:
  - id: "phase-0"
    name: "reference-harness"
    gates:
      - "upstream AMFlow goldens reproducible twice"
      - "automatic_vs_manual reproduced"
      - "environment manifest recorded"
  - id: "phase-1"
    name: "loop-core-parity"
    gates:
      - "family model matches reference"
      - "prefactors locked"
      - "Kira reduction span matches"
  - id: "phase-2"
    name: "full-feature-parity"
    gates:
      - "eta and invariant derivatives close on master space"
      - "local solver residuals pass"
      - "phase-space, linear, complex, fixed-eps, D0, cache, custom modes covered"
  - id: "phase-3"
    name: "hardening-and-release"
    gates:
      - "qualification corpus passes"
      - "performance and diagnostics reviewed"
amf_options:
  - "AMFMode"
  - "EndingScheme"
  - "D0"
  - "WorkingPre"
  - "ChopPre"
  - "XOrder"
  - "ExtraXOrder"
  - "LearnXOrder"
  - "TestXOrder"
  - "RationalizePre"
  - "RunLength"
  - "UseCache"
  - "SkipReduction"
reduction_options:
  - "IBPReducer"
  - "BlackBoxRank"
  - "BlackBoxDot"
  - "ComplexMode"
  - "DeleteBlackBoxDirectory"
kira_options:
  - "IntegralOrder"
  - "ReductionMode"
  - "PermutationOption"
  - "MasterRank"
  - "MasterDot"
example_classes:
  - "automatic_loop"
  - "automatic_phasespace"
  - "automatic_vs_manual"
  - "complex_kinematics"
  - "differential_equation_solver"
  - "feynman_prescription"
  - "linear_propagator"
  - "spacetime_dimension"
  - "user_defined_amfmode"
  - "user_defined_ending"
benchmarks:
  - "package double box"
  - "ttbar j"
  - "ttbar H"
  - "five-point one-mass scattering"
  - "ttbar W"
  - "diphoton heavy-quark form factors"
  - "h -> bb"
  - "N=4 SYM three-loop form factor"
  - "single-top planar/nonplanar"
  - "one singular-endpoint case"
known_regressions:
  - "asymptotic-series overflow"
  - "incorrect Mass-mode insertion"
  - "boundary-generation errors for unnormalized loop momenta"
  - "AnalyzeBlock on non-block-triangular systems"
  - "unexpected master sets in Kira interface"
diagnostics:
  required_failure_codes:
    - "insufficient_precision"
    - "master_set_instability"
    - "boundary_unsolved"
    - "continuation_budget_exhausted"
