family:
  name: "planar_double_box"
  loop_momenta: ["k1", "k2"]
  top_level_sectors: [127]
  preferred_masters:
    - "planar_double_box[1,1,1,1,1,1,1]"
  propagators:
    - expression: "(k1)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k1-p1)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k1-p1-p2)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k2)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k2-p3)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k1-k2)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k2-p1-p2)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
kinematics:
  incoming_momenta: ["p1", "p2"]
  outgoing_momenta: ["p3", "p4"]
  momentum_conservation: "p1 + p2 + p3 + p4 = 0"
  invariants: ["s", "t", "msq"]
  scalar_product_rules:
    - left: "p1*p1"
      right: "0"
    - left: "p2*p2"
      right: "0"
    - left: "p1*p2"
      right: "s/2"
  numeric_substitutions:
    s: "30"
    t: "-10/3"
    msq: "1"
targets:
  - family: "planar_double_box"
    indices: [1, 1, 1, 1, 1, 1, 1]
dimension: "4 - 2*eps"
complex_mode: false
notes: "Bootstrap example aligned with the package-paper double-box family."
