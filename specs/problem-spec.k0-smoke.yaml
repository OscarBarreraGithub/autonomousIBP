family:
  name: "automatic_vs_manual_k0_smoke"
  loop_momenta: ["k1", "k2"]
  top_level_sectors: [127]
  propagators:
    - expression: "(k1)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k1+p1)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k1+p1+p2)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k2)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k2+p3)^2"
      mass: "msq"
      kind: "standard"
      prescription: -1
    - expression: "(k2+p3+p4)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k1+k2)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k1-p3)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
    - expression: "(k2+p1)^2"
      mass: "0"
      kind: "standard"
      prescription: -1
kinematics:
  incoming_momenta: ["p1", "p2"]
  outgoing_momenta: ["p3", "p4"]
  momentum_conservation: "p1 + p2 + p3 + p4 = 0"
  invariants: ["s", "t", "msq"]
  scalar_product_rules:
    - left: "p1*p1"
      right: "0"
    - left: "p2*p2"
      right: "0"
    - left: "p3*p3"
      right: "msq"
    - left: "p1*p2"
      right: "s/2"
    - left: "p1*p3"
      right: "(t-msq)/2"
    - left: "p2*p3"
      right: "(msq-s-t)/2"
  numeric_substitutions:
    s: "30"
    t: "-10/3"
    msq: "1"
targets:
  - family: "automatic_vs_manual_k0_smoke"
    indices: [1, 1, 1, 1, 1, 1, 1, -3, 0]
  - family: "automatic_vs_manual_k0_smoke"
    indices: [1, 1, 1, 1, 1, 1, 1, -2, -1]
  - family: "automatic_vs_manual_k0_smoke"
    indices: [1, 1, 1, 1, 1, 1, 1, -1, -2]
  - family: "automatic_vs_manual_k0_smoke"
    indices: [1, 1, 1, 1, 1, 1, 1, 0, -3]
dimension: "4 - 2*eps"
complex_mode: false
notes: "Repo-local frozen K0 smoke fixture derived from preserved automatic_vs_manual input for the preserved seven-line top sector and maintained as a stable local smoke case."
